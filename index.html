<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Main Sequence &mdash; Studio</title>
  <link rel="icon" type="image/gif" href="favicon.gif">
  <link rel="stylesheet" href="https://use.typekit.net/ixj4arx.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #C8D47A;
      background-image: radial-gradient(circle, rgba(0,0,0,0.18) 1px, transparent 1px);
      background-size: 28px 28px;
      font-family: 'brandon-grotesque', 'Helvetica Neue', Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      width: 100vw;
      height: 100vh;
    }

    #globe-wrap {
      position: relative;
      cursor: grab;
      flex-shrink: 0;
    }

    #globe-wrap:active { cursor: grabbing; }

    #globe-canvas { display: block; }

    #globe-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #globe-loading span {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1;   }
    }

    h1 {
      font-family: 'calvino', Georgia, serif;
      font-size: clamp(36px, 5vw, 72px);
      font-weight: 700;
      line-height: 1.07;
      color: #1A1710;
      letter-spacing: -0.01em;
    }
  </style>
</head>
<body>

  <div id="globe-wrap">
    <canvas id="globe-canvas"></canvas>
    <div id="globe-loading"><span>Loading&hellip;</span></div>
  </div>

  <h1>Coming Soon</h1>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script>
    (function () {

      const canvas  = document.getElementById('globe-canvas');
      const loading = document.getElementById('globe-loading');
      const ctx     = canvas.getContext('2d');
      const dpr     = window.devicePixelRatio || 1;

      const size   = Math.min(window.innerWidth * 0.583, window.innerHeight * 0.473);
      const radius = size / 2;

      canvas.width  = size * dpr;
      canvas.height = size * dpr;
      canvas.style.width  = size + 'px';
      canvas.style.height = size + 'px';
      ctx.scale(dpr, dpr);

      const projection = d3.geoOrthographic()
        .scale(radius)
        .translate([size / 2, size / 2])
        .clipAngle(90);

      const path = d3.geoPath().projection(projection).context(ctx);

      // ── Point-in-polygon ───────────────────────────────────────────────

      function pointInRing(point, ring) {
        const [x, y] = point;
        let inside = false;
        for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
          const [xi, yi] = ring[i];
          const [xj, yj] = ring[j];
          if (yi > y !== yj > y && x < ((xj - xi) * (y - yi)) / (yj - yi) + xi) {
            inside = !inside;
          }
        }
        return inside;
      }

      function pointInFeature(point, feature) {
        const geom = feature.geometry;
        if (geom.type === 'Polygon') {
          if (!pointInRing(point, geom.coordinates[0])) return false;
          for (let i = 1; i < geom.coordinates.length; i++) {
            if (pointInRing(point, geom.coordinates[i])) return false;
          }
          return true;
        }
        if (geom.type === 'MultiPolygon') {
          for (const poly of geom.coordinates) {
            if (pointInRing(point, poly[0])) {
              let inHole = false;
              for (let i = 1; i < poly.length; i++) {
                if (pointInRing(point, poly[i])) { inHole = true; break; }
              }
              if (!inHole) return true;
            }
          }
          return false;
        }
        return false;
      }

      function dotsForFeature(feature, spacing = 16) {
        const dots = [];
        const [[minLng, minLat], [maxLng, maxLat]] = d3.geoBounds(feature);
        const step = spacing * 0.08;
        for (let lng = minLng; lng <= maxLng; lng += step) {
          for (let lat = minLat; lat <= maxLat; lat += step) {
            if (pointInFeature([lng, lat], feature)) dots.push([lng, lat]);
          }
        }
        return dots;
      }

      // ── Render ─────────────────────────────────────────────────────────

      let landFeatures = null;
      const allDots    = [];

      function render() {
        ctx.clearRect(0, 0, size, size);

        const sc = projection.scale();
        const sf = sc / radius;

        // Ocean
        ctx.beginPath();
        ctx.arc(size / 2, size / 2, sc, 0, 2 * Math.PI);
        ctx.fillStyle   = '#C8D47A';
        ctx.fill();
        ctx.strokeStyle = '#000000';
        ctx.lineWidth   = 2 * sf;
        ctx.stroke();

        if (!landFeatures) return;

        // Graticule
        ctx.beginPath();
        path(d3.geoGraticule()());
        ctx.strokeStyle  = '#000000';
        ctx.lineWidth    = 0.8 * sf;
        ctx.globalAlpha  = 0.2;
        ctx.stroke();
        ctx.globalAlpha  = 1;

        // Land outlines
        ctx.beginPath();
        landFeatures.features.forEach(f => path(f));
        ctx.strokeStyle = '#000000';
        ctx.lineWidth   = 0.9 * sf;
        ctx.stroke();

        // Halftone land dots
        allDots.forEach(([lng, lat]) => {
          const p = projection([lng, lat]);
          if (p && p[0] >= 0 && p[0] <= size && p[1] >= 0 && p[1] <= size) {
            ctx.beginPath();
            ctx.arc(p[0], p[1], 1.15 * sf, 0, 2 * Math.PI);
            ctx.fillStyle = '#000000';
            ctx.fill();
          }
        });
      }

      // ── Load GeoJSON ───────────────────────────────────────────────────

      fetch('https://raw.githubusercontent.com/martynafford/natural-earth-geojson/refs/heads/master/110m/physical/ne_110m_land.json')
        .then(r => { if (!r.ok) throw new Error('fetch failed'); return r.json(); })
        .then(data => {
          landFeatures = data;
          data.features.forEach(f => dotsForFeature(f, 16).forEach(d => allDots.push(d)));
          loading.style.display = 'none';
          render();
        })
        .catch(() => {
          loading.innerHTML = '<span>Failed to load map data</span>';
        });

      // ── Auto-rotation ──────────────────────────────────────────────────

      const rot = [-20, -15, -20];
      let autoRotate = true;

      d3.timer(() => {
        if (autoRotate) {
          rot[0] += 0.4;
          projection.rotate(rot);
          render();
        }
      });

      // ── Mouse drag ─────────────────────────────────────────────────────

      canvas.addEventListener('mousedown', e => {
        autoRotate = false;
        const sx = e.clientX, sy = e.clientY;
        const sr = [...rot];

        const onMove = e => {
          rot[0] = sr[0] + (e.clientX - sx) * 0.5;
          rot[1] = Math.max(-90, Math.min(90, sr[1] - (e.clientY - sy) * 0.5));
          projection.rotate(rot);
          render();
        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup',   onUp);
          setTimeout(() => { autoRotate = true; }, 20);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup',   onUp);
      });

      // ── Touch drag ─────────────────────────────────────────────────────

      canvas.addEventListener('touchstart', e => {
        autoRotate = false;
        const t  = e.touches[0];
        const sx = t.clientX, sy = t.clientY;
        const sr = [...rot];

        const onMove = e => {
          const t = e.touches[0];
          rot[0] = sr[0] + (t.clientX - sx) * 0.5;
          rot[1] = Math.max(-90, Math.min(90, sr[1] - (t.clientY - sy) * 0.5));
          projection.rotate(rot);
          render();
        };
        const onEnd = () => {
          canvas.removeEventListener('touchmove', onMove);
          canvas.removeEventListener('touchend',  onEnd);
          setTimeout(() => { autoRotate = true; }, 20);
        };
        canvas.addEventListener('touchmove', onMove, { passive: true });
        canvas.addEventListener('touchend',  onEnd);
      }, { passive: true });

      // ── Scroll zoom ────────────────────────────────────────────────────

      canvas.addEventListener('wheel', e => {
        e.preventDefault();
        const factor   = e.deltaY > 0 ? 0.92 : 1.09;
        const newScale = Math.max(radius * 0.5, Math.min(radius * 3, projection.scale() * factor));
        projection.scale(newScale);
        render();
      }, { passive: false });

    })();
  </script>

</body>
</html>
